<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BillAPP">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    
    <title>BillAPP</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
</head>
<body>
    <div class="bubble b-blue"></div>
    <div class="bubble b-yellow"></div>
    <div class="bubble b-pink"></div>
    <div class="bubble b-green"></div>
    <div class="bubble b-purple"></div>

    <div class="app-container">
        
        <div class="scanner-section">
            <h2 class="section-title">掃描收據</h2>
            
            <div class="viewfinder">
                <div class="viewfinder-corners"></div>
                <div class="receipt-icon">🧾</div>
                <div class="scan-line"></div>
            </div>

            <button class="snap-btn" id="btn-snap">
                <div class="rainbow-plus">+</div>
                <span class="snap-text" id="snap-text">拍一張</span>
            </button>
        </div>

        <div class="control-section">
            <h3 class="control-title">貼士%</h3>
            
            <div class="slider-wrapper">
                <span class="emoji">😡</span>
                <div class="slider-container">
                    <input type="range" min="5" max="25" step="5" value="15" id="tip-slider">
                    <div class="slider-labels">
                        <span>5%</span><span>10%</span><span>15%</span><span>20%</span><span>25%</span>
                    </div>
                </div>
                <span class="emoji">🤩</span>
            </div>

            <h3 class="control-title mt-4">人數</h3>
            <div class="counter-pill">
                <button class="circle-btn" id="btn-minus">−</button>
                <span class="count-value" id="split-count">4</span>
                <button class="circle-btn" id="btn-plus">+</button>
            </div>
        </div>

        <div class="result-section">
            <p class="result-label">每人應付:</p>
            <h1 class="result-amount" id="per-person-amount">$0.00</h1>
            
            <div class="action-row">
                <button class="action-btn" id="btn-share">
                    <div class="action-icon share-icon">↪️</div> <span>分享</span>
                </button>
                <button class="action-btn" id="btn-done">
                    <div class="action-icon done-icon">✔️</div> <span>完成</span>
                </button>
            </div>
        </div>

    </div>

    <input type="file" id="camera-input" accept="image/*" style="display: none;">

    <div id="crop-modal" class="modal-overlay hidden" style="background: #000; z-index: 10000;">
        <div class="crop-container">
            <img id="crop-image" src="" alt="Cropper">
        </div>
        <div class="crop-actions">
            <button class="crop-btn cancel" id="btn-crop-cancel">取消</button>
            <button class="crop-btn confirm" id="btn-crop-confirm">✂️ 裁切並分析</button>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-card">
            <div class="modal-icon" id="modal-icon">✅</div>
            <h3 class="modal-title" id="modal-title">掃描成功！</h3>
            
            <div class="modal-content" id="modal-content"></div>
            
            <button class="modal-close-btn" id="modal-close-btn">確認</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
